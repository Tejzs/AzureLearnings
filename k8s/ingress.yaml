apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sportsbook-ingress
spec:
  rules:
  - http:
      paths:
      - path: /odds/
        pathType: Prefix
        backend:
          service:
            name: odds-api
            port:
              number: 3000
      - path: /wallet/
        pathType: Prefix
        backend:
          service:
            name: wallet-service
            port:
              number: 3001
      - path: /bet/
        pathType: Prefix
        backend:
          service:
            name: bet-service
            port:
              number: 3002
